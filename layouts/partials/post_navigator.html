<div class="post-navigator">
  <p>
    {{ if .PrevInSection }}
      <a href="{{ .PrevInSection.RelPermalink }}"><< Previous Post</a>
    {{ else }}
      <strike><< Previous Post</strike>
    {{ end }}
  </p>
  <p>|</p>
  <p>
    {{ if .NextInSection }}
      <a href="{{ .NextInSection.RelPermalink }}">Next Post >></a>
    {{ else }}
      <strike>Next Post >></strike>
    {{ end }}
  </p>
</div>
